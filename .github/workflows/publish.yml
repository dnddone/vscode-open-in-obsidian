name: Publish extension

on:
  push:
    tags:
      - "*@*"

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Resolve extension from tag
        id: tag
        run: |
          TAG="${GITHUB_REF_NAME}"
          echo "package=${TAG%@*}" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#*@}" >> "$GITHUB_OUTPUT"

      - name: Verify package.json version matches tag
        run: |
          cd packages/${{ steps.tag.outputs.package }}
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$PKG_VERSION" != "${{ steps.tag.outputs.version }}" ]; then
            echo "Tag version (${{ steps.tag.outputs.version }}) does not match package.json version ($PKG_VERSION)"
            exit 1
          fi

      - run: pnpm install --frozen-lockfile

      - name: Publish to Marketplace
        working-directory: packages/${{ steps.tag.outputs.package }}
        run: pnpm exec vsce publish --no-dependencies -p ${{ secrets.VSCE_PAT }}
